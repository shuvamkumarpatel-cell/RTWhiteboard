services:
  - type: web
    name: realtime-whiteboard-api
    runtime: docker
    dockerfilePath: ./backend/Whiteboard.Api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: FRONTEND_ORIGINS
        sync: false
